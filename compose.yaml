services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mofutenshi
      POSTGRES_PASSWORD: mofutenshi
      POSTGRES_DB: mofutenshi
    ports:
      # Host port avoids Windows WinNAT excluded ranges (which cover 5432 after
      # some reboots and silently block the bind).
      - "15432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mofutenshi -d mofutenshi"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
